# Actualiza image.tag Y rollout.strategy en el values del ambiente en belo-helm-charts.
# Ambos campos cambian juntos: la estrategia del Rollout se determina en el tag,
# no es una propiedad fija de la app. El commit dispara el sync de ArgoCD.
# Auth: el secret gitops-github-token (key: token) permite push HTTPS a GitHub.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bump-gitops-image
  namespace: tekton-pipelines
spec:
  params:
  - name: gitops-repo-url
    type: string
  - name: app-name
    type: string
  - name: environment
    type: string
  - name: image-tag
    type: string
  - name: strategy
    type: string
    default: rollingupdate
  - name: git-user-name
    default: "tekton-bot"
    type: string
  - name: git-user-email
    default: "tekton@belo-challenge.dev"
    type: string
  workspaces:
  - name: gitops
  steps:
  - name: clone-gitops
    image: alpine/git:latest
    env:
    - name: GIT_TOKEN
      valueFrom:
        secretKeyRef:
          name: gitops-github-token
          key: token
          optional: true
    script: |
      #!/bin/sh
      set -e
      REPO_URL="$(params.gitops-repo-url)"
      # Si hay token, embebelo en la URL para auth HTTPS.
      if [ -n "$GIT_TOKEN" ]; then
        REPO_URL=$(echo "$REPO_URL" | sed "s|https://|https://tekton-bot:${GIT_TOKEN}@|")
      fi
      git clone "$REPO_URL" "$(workspaces.gitops.path)/gitops"
      echo "Gitops clonado"

  - name: bump-tag-and-strategy
    image: mikefarah/yq:latest
    script: |
      #!/bin/sh
      set -e
      VALUES_FILE="$(workspaces.gitops.path)/gitops/values-apps-files/$(params.app-name)/values-$(params.environment)-$(params.app-name).yaml"
      if [ ! -f "$VALUES_FILE" ]; then
        echo "WARN: $VALUES_FILE no encontrado, skipping bump"
        exit 0
      fi
      # Actualiza imagen Y estrategia en un solo paso.
      yq e ".image.tag = \"$(params.image-tag)\" | .rollout.strategy = \"$(params.strategy)\"" -i "$VALUES_FILE"
      echo "Bumped: image.tag=$(params.image-tag)  rollout.strategy=$(params.strategy)"
      echo "Archivo actualizado:"
      cat "$VALUES_FILE"

  - name: commit-and-push
    image: alpine/git:latest
    env:
    - name: GIT_TOKEN
      valueFrom:
        secretKeyRef:
          name: gitops-github-token
          key: token
          optional: true
    script: |
      #!/bin/sh
      set -e
      cd "$(workspaces.gitops.path)/gitops"
      git config user.name "$(params.git-user-name)"
      git config user.email "$(params.git-user-email)"
      # Reconfigurar remote con token si está disponible.
      if [ -n "$GIT_TOKEN" ]; then
        ORIGIN=$(git remote get-url origin | sed "s|https://|https://tekton-bot:${GIT_TOKEN}@|")
        git remote set-url origin "$ORIGIN"
      fi
      git add .
      if git diff --staged --quiet; then
        echo "Sin cambios que commitear"
        exit 0
      fi
      git commit -m "bump $(params.app-name) → $(params.image-tag) [$(params.strategy)] en $(params.environment)"
      git push origin main
      echo "Push OK"
