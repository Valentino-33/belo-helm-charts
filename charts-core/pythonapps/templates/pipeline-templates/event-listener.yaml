# EventListener: recibe webhooks de GitHub y dispara el pipeline.
#
# Convención de tag requerida: <env>/<strategy>/<semver>
#   git tag production/bluegreen/v1.4.0
#   git push origin production/bluegreen/v1.4.0
#
# CEL extrae los tres segmentos del tag. Tags con formato distinto son ignorados.
# Environments válidos: dev | staging | production | testing | lab
# Strategies válidas:   bluegreen | canary | rollingupdate
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: github-tag-listener
  namespace: tekton-pipelines
spec:
  serviceAccountName: tekton-triggers-sa
  triggers:
  - name: github-tag-push
    interceptors:
    - ref:
        name: "cel"
        kind: ClusterInterceptor
      params:
      - name: filter
        value: >-
          header.match('X-Github-Event', 'push') &&
          body.ref.startsWith('refs/tags/') &&
          body.ref.split('/').size() == 5
      - name: overlays
        value:
        - key: environment
          expression: "body.ref.split('/')[2]"
        - key: strategy
          expression: "body.ref.split('/')[3]"
        - key: image_tag
          expression: "body.ref.split('/')[4]"
    bindings:
    - ref: github-tag-binding
    template:
      ref: pythonapps-trigger-template
---
# Ingress para recibir webhooks de GitHub (ajustar hostname al dominio real).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tekton-event-listener
  namespace: tekton-pipelines
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: tekton-webhook.{{ .Values.ingress.hostname | default "localhost" }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: el-github-tag-listener
            port:
              number: 8080
