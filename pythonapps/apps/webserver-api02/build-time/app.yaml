# Valores fijos para webserver-api02 — no varían por ambiente.
# Combinar con: helm template api02 pythonapps/ -f build-time/app.yaml -f <env>/values.yaml
app:
  name: webserver-api02
  pathPrefix: api02
  metricsPath: /api02/metrics

rollout:
  strategy: canary

image:
  repository: docker.io/valentinobruno/api02
  pullPolicy: IfNotPresent

tekton:
  dockerhubUser: valentinobruno
  gitopsRepoUrl: https://github.com/Valentino-33/gitops-files

serviceMonitor:
  enabled: true
  interval: 30s
