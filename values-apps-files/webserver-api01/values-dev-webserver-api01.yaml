image:
  tag: "latest"

# Default para dev. bump-gitops lo sobreescribe con la strategy del tag en cada deploy.
rollout:
  strategy: rollingupdate

replicas: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  hostname: api01.dev.belo-challenge.dev
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
