image:
  tag: "latest"

# Default para testing. bump-gitops lo sobreescribe con la strategy del tag en cada deploy.
rollout:
  strategy: rollingupdate

replicas: 1

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: true
  hostname: api02.testing.belo-challenge.dev
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
